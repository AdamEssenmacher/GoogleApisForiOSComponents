name: Firebase E2E

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  firebase-e2e:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain versions
        run: |
          xcodebuild -version
          swift --version
          xcode-select -p

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore .NET workloads
        run: dotnet workload restore Xamarin.Google.sln

      - name: Install CocoaPods
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods
          fi
          pod --version

      - name: Restore tools
        run: dotnet tool restore

      - name: Build + pack Firebase Analytics slice
        run: dotnet tool run dotnet-cake -- --target=nuget --names="Firebase.Analytics"

      - name: Build Mac Catalyst consumer app
        run: |
          dotnet build tests/E2E/Firebase.Foundation/FirebaseFoundationE2E/FirebaseFoundationE2E.csproj \
            --configuration Release \
            --framework net9.0-maccatalyst \
            --configfile tests/E2E/Firebase.Foundation/NuGet.config \
            -p:RuntimeIdentifier=maccatalyst-arm64 \
            -p:EnableCodeSigning=false

      - name: Run iOS simulator E2E smoke test
        run: tools/e2e/run-firebase-foundation.sh --package-dir output --configuration Debug

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-e2e-artifacts
          path: tests/E2E/Firebase.Foundation/artifacts/**
